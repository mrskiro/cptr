name: CI macOS

on:
  push:
    branches: [main]
    paths:
      - "apps/macos/**"
      - ".github/workflows/ci-macos.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/macos/**"
      - ".github/workflows/ci-macos.yml"

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('apps/macos/app.xcodeproj/project.pbxproj') }}
          restore-keys: spm-

      - run: xcodebuild -project apps/macos/app.xcodeproj -scheme app build CODE_SIGNING_ALLOWED=NO
